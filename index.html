<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jannah Light - جنة لايت</title>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 2px solid #d4af37; padding: 30px; border-radius: 20px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .btn-lang { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-lang:hover { background: #d4af37; color: black; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: #d4af37; color: black; padding: 20px; border-radius: 12px; font-weight: bold; text-decoration: none; border: none; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); background: #fff; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .expertise { font-style: italic; color: #aaa; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- أزرار اللغات الثلاث -->
        <div class="lang-switch">
            <button class="btn-lang">العربية</button>
            <button class="btn-lang">Français</button>
            <button class="btn-lang">English</button>
        </div>

        <h1>JANNAH LIGHT</h1>
        <div class="expertise">
            20 ans d'expertise | 20 Years of Expertise | خبرة 20 عاماً
        </div>

        <div class="main-grid">
            <button class="card">Produits<br>Products<br>المنتجات</button>
            <button class="card">Innovation<br>ابتكاراتنا</button>
            <button class="card">Contact<br>اتصل بنا</button>
            <button class="card">Technique<br>المواصفات</button>
        </div>
    </div>
</body>
</html>
